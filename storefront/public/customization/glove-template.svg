<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="leather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#d9a066"/>
      <stop offset="1" stop-color="#b97a3c"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>
  <rect width="800" height="1000" fill="#f4f1ec"/>
  <!-- glove drop shadow -->
  <g filter="url(#soft)" opacity="0.35">
    <path d="M250 470 q-40 -180 10 -300 q30 -70 70 -10 q10 40 8 110 q30 -160 70 -170 q40 -6 34 60 q-6 70 -18 130 q40 -140 84 -140 q42 2 26 74 q-14 66 -34 124 q34 -96 78 -84 q36 12 12 78 q-30 84 -70 150 q40 60 34 150 q-8 150 -120 190 q-150 40 -260 -30 q-70 -48 -70 -150 q0 -110 40 -170 z" fill="#000" transform="translate(14 18)"/>
  </g>
  <!-- glove body (back of hand facing viewer) -->
  <path d="M250 470 q-40 -180 10 -300 q30 -70 70 -10 q10 40 8 110 q30 -160 70 -170 q40 -6 34 60 q-6 70 -18 130 q40 -140 84 -140 q42 2 26 74 q-14 66 -34 124 q34 -96 78 -84 q36 12 12 78 q-30 84 -70 150 q40 60 34 150 q-8 150 -120 190 q-150 40 -260 -30 q-70 -48 -70 -150 q0 -110 40 -170 z" fill="url(#leather)" stroke="#8a5a28" stroke-width="4"/>
  <!-- cuff -->
  <rect x="300" y="820" width="230" height="120" rx="20" fill="#a06a30" stroke="#8a5a28" stroke-width="4"/>
  <!-- subtle stitching guide on the back of hand (printable region) -->
  <rect x="300" y="470" width="220" height="250" rx="14" fill="none" stroke="#8a5a28" stroke-dasharray="6 10" stroke-width="2" opacity="0.4"/>
  <text x="400" y="985" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#8a7a63">Back of hand — printable area outlined</text>
</svg>

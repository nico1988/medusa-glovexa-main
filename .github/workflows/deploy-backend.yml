name: Deploy backend

# Deploys the Medusa backend by SSHing into the GCP VM and having it rebuild
# the `backend` container from the latest code. The image is built ON the VM;
# no image registry is involved. App secrets (DB password, JWT, etc.) are
# stored as one base64-encoded GitHub secret and installed as the VM's `.env`.
#
# Required GitHub secrets (Settings → Secrets and variables → Actions):
#   VM_SSH_HOST   external IP or domain of the VM
#   VM_SSH_USER   SSH user
#   VM_SSH_KEY    SSH private key (PEM), matching an authorized_keys entry on the VM
#   VM_SSH_PORT   (optional) SSH port, defaults to 22
#   BACKEND_ENV_FILE_B64  base64-encoded production .env file
# Optional GitHub variable:
#   VM_PROJECT_PATH   path to the cloned repo on the VM (default below). A
#                     leading ~ is expanded to $HOME, so both ~/foo and
#                     /home/user/foo work.

on:
  push:
    branches: [main]
    # Only redeploy when something the backend image cares about changes.
    paths:
      - "backend/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy-backend.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          BACKEND_ENV_FILE_B64: ${{ secrets.BACKEND_ENV_FILE_B64 }}
        with:
          host: ${{ secrets.VM_SSH_HOST }}
          username: ${{ secrets.VM_SSH_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_SSH_PORT || 22 }}
          command_timeout: 15m
          envs: BACKEND_ENV_FILE_B64
          script: |
            set -e
            whoami
            pwd
            # `~` is not expanded inside double quotes, so expand a leading ~
            # to $HOME ourselves — otherwise cd looks for a dir literally
            # named "~" and fails even when the path exists.
            PROJECT_PATH="${{ vars.VM_PROJECT_PATH || '$HOME/medusa-glovexa-main' }}"
            PROJECT_PATH="${PROJECT_PATH/#\~/$HOME}"
            cd "$PROJECT_PATH"
            git pull --ff-only

            if [ -z "$BACKEND_ENV_FILE_B64" ]; then
              echo "ERROR: GitHub secret BACKEND_ENV_FILE_B64 is missing."
              exit 1
            fi
            printf '%s' "$BACKEND_ENV_FILE_B64" | base64 --decode > .env.tmp
            chmod 600 .env.tmp
            mv .env.tmp .env

            COMPOSE="docker compose --env-file .env -f docker-compose.prod.yml"
            $COMPOSE config --quiet

            # Failed builds and old tagged images accumulate on this small VM.
            # Remove everything unused before building. Named volumes (pgdata,
            # redisdata, etc.) are never touched because --volumes is omitted.
            df -h /
            docker system df
            docker builder prune -af
            docker container prune -f
            docker image prune -af
            df -h /

            # Show service state and recent application/proxy logs if startup fails.
            trap '$COMPOSE ps; $COMPOSE logs --tail=100 backend caddy' ERR
            $COMPOSE up -d --build --wait --wait-timeout 180 backend caddy
            # migrations run automatically via the container entrypoint
            $COMPOSE ps backend caddy
            docker image prune -af

      - name: Verify public backend health
        run: |
          for attempt in {1..18}; do
            if curl --fail --silent --show-error \
              --connect-timeout 5 --max-time 10 \
              https://api.ccsunny.cn/health; then
              exit 0
            fi
            echo "Public health check attempt $attempt failed; retrying..."
            sleep 10
          done
          exit 1
